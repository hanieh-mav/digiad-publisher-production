<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Page</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f5f5f5;
    }

    header {
      height: 70px;
      background: #222;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 30px;
      font-size: 24px;
      font-weight: bold;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-size: 48px;
      color: #333;
    }
  </style>
</head>
<body>

  <header>
    Hanieh Site
  </header>

  <main>
    <h1>Where is ads?</h1>
  </main>

</body>
</html>
